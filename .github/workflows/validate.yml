name: validate

on:
  pull_request:
    paths:
      - ".gitattributes"
      - ".github/scripts/verify-manifest-signature.mjs"
      - "manifest.json"
      - "manifest.json.sig"
      - "manifest.schema.json"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
      - ".github/workflows/validate.yml"
  push:
    branches: [main]
    paths:
      - ".gitattributes"
      - ".github/scripts/verify-manifest-signature.mjs"
      - "manifest.json"
      - "manifest.json.sig"
      - "manifest.schema.json"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
      - ".github/workflows/validate.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  schema:
    name: Validate manifest schema and signature
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - run: npm ci

      - name: Validate schema and semantic invariants
        run: npm run validate && npm run semantic-diff

      - name: Verify signature against production public key
        run: npm run verify-signature

      - name: Probe public jsDelivr endpoint
        run: |
          set -euo pipefail
          URL="https://cdn.jsdelivr.net/gh/${GITHUB_REPOSITORY}@main/manifest.json"
          echo "Probing $URL"
          status=$(curl -s -o /tmp/cdn.json -w "%{http_code}" "$URL" || echo "fail")
          if [ "$status" = "200" ]; then
            echo "jsDelivr returned 200 — CDN is live."
            jq '.schema_version, (.vendors | length)' /tmp/cdn.json
          else
            echo "jsDelivr returned $status — CDN may be warming up (12h edge cache). Not failing."
          fi
