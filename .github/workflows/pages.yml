name: pages

on:
  push:
    branches: [main]
    paths: ["site/**", "manifest.json", "manifest.json.sig", "manifest.schema.json", "llms*.txt", "robots.txt", "sitemap.xml", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: cp manifest.json manifest.json.sig manifest.schema.json llms.txt llms-full.txt robots.txt sitemap.xml site/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
