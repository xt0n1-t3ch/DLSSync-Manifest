name: poll-upstream

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/poll-upstream.yml"

permissions:
  contents: write

concurrency:
  group: poll-upstream
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v5

      - name: Checkout DLSSync app (Rust builder lives there)
        uses: actions/checkout@v5
        with:
          repository: xt0n1-t3ch/DLSSync
          path: .dlssync-src
          ref: main

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .dlssync-src -> target
          shared-key: manifest-builder

      - name: Build manifest-builder
        working-directory: .dlssync-src
        run: cargo build --release -p manifest-builder

      - name: Require signing key (refuse to publish unsigned)
        env:
          KEY: ${{ secrets.DLSSYNC_MANIFEST_SIGNING_KEY }}
        run: |
          [ -n "$KEY" ] || { echo "::error::DLSSYNC_MANIFEST_SIGNING_KEY is empty — refusing to publish an unsigned manifest"; exit 1; }

      - name: Run manifest-builder (emits manifest.json + manifest.json.sig)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DLSSYNC_MANIFEST_SIGNING_KEY: ${{ secrets.DLSSYNC_MANIFEST_SIGNING_KEY }}
          RUST_LOG: info
        run: |
          .dlssync-src/target/release/manifest-builder --out manifest.json

      - name: Setup Node (for ajv-cli)
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Validate manifest against schema
        run: |
          npx --yes ajv-cli@5 validate \
            -s manifest.schema.json \
            -d manifest.json \
            --strict=false \
            --spec=draft2020 \
            --all-errors

      - name: Verify signature against production public key
        run: |
          cat > verify-sig.mjs <<'EOF'
          import { readFileSync } from "node:fs";
          const pk = Buffer.from("e9dd0828f9ee5ecb72e0a811723a79c6e5373ca1c20bd5b255d68a2b3928fcd3", "hex");
          const b64u = (b) => b.toString("base64").replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
          const vk = await crypto.subtle.importKey("jwk", { kty: "OKP", crv: "Ed25519", x: b64u(pk) }, { name: "Ed25519" }, false, ["verify"]);
          const m = readFileSync("manifest.json");
          const s = Buffer.from(readFileSync("manifest.json.sig", "utf8").trim(), "hex");
          if (!(await crypto.subtle.verify({ name: "Ed25519" }, vk, s, m))) {
            console.error("::error::manifest.json.sig does not verify against the production public key");
            process.exit(1);
          }
          console.log("manifest.json.sig verifies against the production public key");
          EOF
          node verify-sig.mjs
          rm -f verify-sig.mjs

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- manifest.json manifest.json.sig; then
            echo "Manifest unchanged — no commit"
            exit 0
          fi
          git config user.name "dlssync-bot"
          git config user.email "dlssync-bot@users.noreply.github.com"
          git add manifest.json manifest.json.sig
          DIFFSTAT=$(git diff --cached --shortstat manifest.json)
          git commit -m "chore: rebuild manifest from upstream" \
                     -m "Generated by .github/workflows/poll-upstream.yml" \
                     -m "$DIFFSTAT"
          git push
